
services:
  dockercode:
    build:
      context: .
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: dockercode
    stdin_open: true
    tty: true
    volumes:
      - ./homedir:/home/coder
    environment:
      - TERM=${TERM}
      - COLUMNS=${COLUMNS}
      - LINES=${LINES}
    ports:
      - "127.0.0.1:4096:4096"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 1.1.1.1


